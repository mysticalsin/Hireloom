<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  /* =========================================================================
     Hireloom CV template — timeline style (clean B/W, timeline work history).
     Based on the candidate's own resume design. ATS-safe: real selectable
     text, single logical column, decorative timeline via CSS pseudo-elements.
     System font stack (no external font files required).
     ========================================================================= */

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    line-height: 1.5;
    color: #1a1a1a;
    background: #ffffff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 40px 48px;
  }

  /* === HEADER === */
  .header { margin-bottom: 6px; }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 16px;
  }

  .header h1 {
    font-size: 30px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: #111;
    line-height: 1.05;
  }

  .header .role {
    font-size: 15px;
    font-weight: 700;
    color: #222;
    white-space: nowrap;
    padding-bottom: 3px;
  }

  .header-rule {
    height: 2px;
    background: linear-gradient(to right, #777, #d8d8d8);
    margin: 8px 0 10px;
  }

  .contact-row {
    text-align: center;
    font-size: 11px;
    color: #333;
  }
  .contact-row a { color: #333; text-decoration: none; white-space: nowrap; }
  .contact-row .sep { color: #999; padding: 0 6px; }

  /* === SECTIONS === */
  .section { margin-bottom: 11px; }

  .section-title {
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: #111;
    margin-bottom: 8px;
  }

  .summary-text {
    font-size: 11px;
    line-height: 1.48;
    color: #2b2b2b;
    text-align: justify;
  }

  /* === WORK EXPERIENCE (timeline) === */
  .experience { position: relative; padding-left: 22px; }
  /* the connecting vertical line */
  .experience::before {
    content: '';
    position: absolute;
    left: 4px;
    top: 6px;
    bottom: 8px;
    width: 1.5px;
    background: #c9c9c9;
  }

  .job { position: relative; margin-bottom: 9px; }
  /* the timeline dot */
  .job::before {
    content: '';
    position: absolute;
    left: -22px;
    top: 3px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 2px solid #ffffff;
    box-shadow: 0 0 0 1px #1a1a1a;
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .job-title { font-size: 12px; font-weight: 700; color: #111; }
  .job-period { font-size: 11px; font-weight: 700; color: #111; white-space: nowrap; }
  .job-location { font-size: 10.5px; color: #555; margin-bottom: 4px; }

  .job ul { padding-left: 16px; margin-top: 3px; }
  .job li {
    font-size: 10.5px;
    line-height: 1.42;
    color: #2b2b2b;
    margin-bottom: 3px;
    text-align: justify;
  }
  .job li strong { font-weight: 700; }

  /* === TWO-COLUMN BLOCK (Education | Certifications) === */
  .two-col {
    display: flex;
    gap: 40px;
    margin-bottom: 16px;
  }
  .two-col > .col { flex: 1; min-width: 0; }

  .edu-degree, .cert-title { font-size: 11px; font-weight: 700; color: #111; }
  .edu-org { font-size: 11px; color: #333; margin-top: 1px; }
  .edu-detail { font-size: 11px; color: #333; margin-left: 14px; }
  .edu-date, .cert-date { font-size: 11px; font-weight: 700; color: #111; margin-top: 1px; }
  .edu-item { margin-bottom: 8px; }
  .cert-item { margin-bottom: 10px; }
  .cert-org { font-size: 11px; color: #333; }

  /* === COMPETENCIES & TOOLS === */
  .ct-block { margin-bottom: 8px; }
  .ct-label { font-weight: 700; color: #111; font-size: 11px; }
  .ct-list { font-size: 11px; color: #2b2b2b; line-height: 1.6; }

  /* === PAGE-BREAK CONTROL === */
  .avoid-break, .job, .edu-item, .cert-item, .two-col { break-inside: avoid; page-break-inside: avoid; }
  /* keep all work history on page 1; push education + certs + competencies to page 2 */
  .page-two { page-break-before: always; }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 40px 48px; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER: name (left) + role (right), rule, centered contact -->
  <div class="header avoid-break">
    <div class="header-row">
      <h1>{{NAME}}</h1>
      <div class="role">{{TITLE}}</div>
    </div>
    <div class="header-rule"></div>
    <div class="contact-row">{{CONTACT_LINE}}</div>
  </div>

  <!-- PROFESSIONAL SUMMARY -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SUMMARY}}</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <!-- WORK EXPERIENCE (timeline) -->
  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    <div class="experience">
      {{EXPERIENCE}}
    </div>
  </div>

  <!-- PAGE 2: EDUCATION | CERTIFICATIONS | COMPETENCIES -->
  <div class="page-two">
  <!-- EDUCATION | CERTIFICATIONS (two columns) -->
  <div class="two-col">
    <div class="col">
      <div class="section-title">{{SECTION_EDUCATION}}</div>
      {{EDUCATION}}
    </div>
    <div class="col">
      <div class="section-title">{{SECTION_CERTIFICATIONS}}</div>
      {{CERTIFICATIONS}}
    </div>
  </div>

  <!-- CORE COMPETENCIES & TOOLS -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_COMPETENCIES}}</div>
    <div class="ct-block"><span class="ct-label">Competencies:</span>
      <span class="ct-list">{{COMPETENCIES}}</span>
    </div>
    <div class="ct-block"><span class="ct-label">Tools:</span>
      <span class="ct-list">{{SKILLS}}</span>
    </div>
  </div>
  </div>

</div>
</body>
</html>
<!--
  PLACEHOLDER REFERENCE (filled at CV-generation time):
  {{LANG}}        e.g. en
  {{PAGE_WIDTH}}  e.g. 8.5in (letter) / 210mm (a4)
  {{NAME}}        JANE EXAMPLE
  {{TITLE}}       Project Manager
  {{CONTACT_LINE}} email <span class="sep">|</span> phone <span class="sep">|</span> location
  {{SECTION_SUMMARY}} = "Professional Summary"
  {{SUMMARY_TEXT}}    = one paragraph
  {{SECTION_EXPERIENCE}} = "Work Experience"
  {{EXPERIENCE}}  = repeat per job:
      <div class="job">
        <div class="job-header"><span class="job-title">Role, Company</span><span class="job-period">Mon YYYY – Mon YYYY</span></div>
        <div class="job-location">City, ST</div>
        <ul><li><strong>Lead metric.</strong> detail…</li>…</ul>
      </div>
  {{SECTION_EDUCATION}} = "Education"  ; {{EDUCATION}} = .edu-item blocks
  {{SECTION_CERTIFICATIONS}} = "Certifications" ; {{CERTIFICATIONS}} = .cert-item blocks
  {{SECTION_COMPETENCIES}} = "Core Competencies & Tools"
  {{COMPETENCIES}} / {{SKILLS}} = " • "-joined plain text
-->
</html>
