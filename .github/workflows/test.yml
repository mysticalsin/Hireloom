name: Tests

on:
  pull_request:
    branches: [main, security/*, feat/*]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref.
# Keeps queue times sane on fast-moving branches.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit + integration (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run unit + HTTP integration tests
        run: npm test

      - name: Quick smoke (engine/test-all.mjs)
        run: node engine/test-all.mjs --quick

  go-build:
    name: Go build (TUI dashboard)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/tui/go.mod
          cache: true
          cache-dependency-path: apps/tui/go.sum
      - name: Verify go.mod is tidy
        run: |
          cd apps/tui
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Build TUI binary
        run: |
          cd apps/tui
          go build -v ./...
      - name: Run Go tests (if present)
        run: |
          cd apps/tui
          go test ./... || [ $? -eq 1 ]  # tolerate "no test files"

  brand-assets:
    name: Brand assets sanity
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - name: Verify brand assets are well-formed
        run: |
          # Each asset must exist + be non-empty + parse-able
          test -s apps/web/assets/favicon.svg
          test -s apps/web/assets/favicon-light.svg
          test -s apps/web/assets/og-image.svg
          test -s apps/web/assets/manifest.webmanifest
          # Manifest must be valid JSON (ESM-friendly check)
          node --input-type=module -e "import { readFileSync } from 'node:fs'; JSON.parse(readFileSync('apps/web/assets/manifest.webmanifest','utf8'));"
          # SVGs must contain the hex-H path signature (catch silent overwrites)
          grep -q "M4 12 L9 4 L14 12" apps/web/assets/favicon.svg
          grep -q "M4 12 L9 4 L14 12" apps/web/assets/og-image.svg

  version-sync:
    name: Version sync (package.json ↔ server.mjs ↔ tests)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: APP_VERSION must match package.json + tests
        run: |
          # Read package.json with grep+sed instead of node -p (ESM-only sandbox)
          PKG=$(grep -m1 '"version"' package.json | sed -E 's/.*"version":[[:space:]]*"([^"]+)".*/\1/')
          SRV=$(grep -E "^const APP_VERSION = '[^']+';$" apps/web/server.mjs | sed -E "s/.*'([^']+)'.*/\1/")
          TST=$(grep -oE "json.version, '[^']+'" tests/server.test.mjs | sed -E "s/.*'([^']+)'.*/\1/")
          echo "package.json:  $PKG"
          echo "APP_VERSION:   $SRV"
          echo "test asserts:  $TST"
          if [ "$PKG" != "$SRV" ] || [ "$PKG" != "$TST" ]; then
            echo "::error::Version mismatch — bump all three together"
            exit 1
          fi
