name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (node:test)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run unit tests
        run: npm test
      - name: Syntax-check server
        run: node --check dashboard-web/server.mjs
      - name: Syntax-check helpers
        run: |
          node --check dashboard-web/lib/onboard.mjs
          node --check dashboard-web/lib/path-safety.mjs

  legacy:
    name: Legacy test-all (if present)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: npm install --no-audit --no-fund
      - name: Run legacy test-all (skip if missing)
        run: |
          if [ -f test-all.mjs ]; then
            node test-all.mjs --quick
          else
            echo "test-all.mjs not present in this branch — skipping"
          fi
