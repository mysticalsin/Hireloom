name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    # first-interaction@v3 mis-detects "first": on PR events it also counts the
    # author's prior ISSUES, so anyone who never opened an issue gets welcomed on
    # every PR. Gate on GitHub's own author_association instead.
    if: ${{ contains(fromJSON('["FIRST_TIME_CONTRIBUTOR", "FIRST_TIMER", "NONE"]'), github.event.pull_request.author_association || github.event.issue.author_association) }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          pr_message: |
            Welcome to Hireloom, @${{ github.actor }}! Thanks for your first PR.

            A few things to know:
            - Tests will run automatically — check the status below
            - Make sure you've linked a related issue (required for features)
            - Read [.github/CONTRIBUTING.md](https://github.com/mysticalsin/Hireloom/blob/main/CONTRIBUTING.md) if you haven't

            We'll review your PR soon. Join our [Discord](https://discord.gg/3jEjwygjNG) if you have questions.
          issue_message: |
            Thanks for opening your first issue, @${{ github.actor }}! We'll take a look soon.

            In the meantime:
            - Check [.github/SUPPORT.md](https://github.com/mysticalsin/Hireloom/blob/main/SUPPORT.md) for setup help
            - Join our [Discord](https://discord.gg/3jEjwygjNG) for quick answers
