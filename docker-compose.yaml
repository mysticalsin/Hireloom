services:
  hireloom:
    build: .
    container_name: hireloom
    restart: unless-stopped
    volumes:
      # Mount the project directory so user data (CV, profile, reports,
      # tracker) lives on the host. Container is treated as ephemeral.
      - .:/app
    env_file:
      - .env
    environment:
      # Dashboard
      PORT: ${PORT:-4747}
      HOST: ${HOST:-0.0.0.0}              # 0.0.0.0 inside container; host port-mapped below
      # Kimi (Moonshot AI) API key — OpenAI-compatible endpoint
      KIMI_API_KEY: ${KIMI_API_KEY}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      # Ollama (Gemma 4) — connects to host machine Ollama instance
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host-docker-internal:11434}
      GEMMA_MODEL: ${GEMMA_MODEL:-gemma4:latest}
      # Playwright
      PLAYWRIGHT_BROWSERS_PATH: /usr/bin
      PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium
    ports:
      # Map host:container for the dashboard. Override DASHBOARD_PORT in .env.
      - "${DASHBOARD_PORT:-4747}:4747"
    extra_hosts:
      # Allow container to reach host machine's Ollama
      - "host-docker-internal:host-gateway"
    stdin_open: true
    tty: true
    # Default: launch the dashboard. Override via `docker compose run` for shell.
    command: ["node", "apps/web/server.mjs"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4747/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      org.opencontainers.image.source: "https://github.com/mysticalsin/Hireloom"
      org.opencontainers.image.description: "Hireloom AI job-search dashboard"
      org.opencontainers.image.licenses: "PolyForm-Shield-1.0.0"
